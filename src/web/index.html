<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Backend DS Dashboard</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #0f172a;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }
    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 16px;
    }
    .title {
      margin: 0 0 12px;
      font-size: 18px;
      color: #93c5fd;
    }
    .value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .stats {
      display: flex;
      gap: 24px;
      margin-bottom: 12px;
    }
    .stat-label {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
      line-height: 1.5;
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      text-align: left;
      padding: 8px;
      height: 52px;
      box-sizing: border-box;
      border-bottom: 1px solid #1f2937;
    }
    th {
      color: #93c5fd;
    }
    .self-node {
      background: rgba(34, 197, 94, 0.12);
      color: #86efac;
    }
    .badge {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #14532d;
      color: #bbf7d0;
      font-size: 12px;
    }
    .node-role {
      margin-top: 4px;
      font-size: 12px;
      color: #94a3b8;
    }
    .master-role {
      color: #f87171;
      font-weight: 700;
    }
    .table-scroll {
      max-height: 360px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <h2 class="title">集群节点</h2>
      <div class="stats">
        <div>
          <div class="stat-label">Master 数量</div>
          <div class="value" id="masterCount">0</div>
        </div>
        <div>
          <div class="stat-label">Worker 数量</div>
          <div class="value" id="workerCount">0</div>
        </div>
        <div>
          <div class="stat-label">全部节点数量</div>
          <div class="value" id="allNodeCount">0</div>
        </div>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>节点</th>
              <th>地址</th>
              <th>负载</th>
              <th>心跳时间</th>
            </tr>
          </thead>
          <tbody id="allNodeRows"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2 class="title">当前节点 / 当前配置</h2>
      <div class="value" id="selfNodeId">-</div>
      <pre id="selfNodeInfo">{}</pre>
      <br>
      <pre id="configInfo">{}</pre>
    </div>

    <div class="card">
      <h2 class="title">Master 设备信息 / 玩家在线数</h2>
      <pre id="masterDeviceInfo">{}</pre>
      <br>
      <div class="stat-label">玩家在线数</div>
      <div class="value" id="playerCount">0</div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    function formatTime(ts) {
      if (!ts) return "-";
      return new Date(ts * 1000).toLocaleString();
    }

    function formatMemory(totalKb) {
      const kb = Number(totalKb || 0);
      if (!Number.isFinite(kb) || kb <= 0) return "-";
      if (kb >= 1024 * 1024) {
        return `${(kb / 1024 / 1024).toFixed(2)} GB`;
      }
      return `${(kb / 1024).toFixed(2)} MB`;
    }

    function renderDashboard(data) {
      const cfg = data.config ?? {};
      const selfNode = cfg.distributed ?? {};
      const masterDevice = data.master_device ?? {};

      document.getElementById("selfNodeId").textContent =
        selfNode.node_id ?? "-";
      document.getElementById("selfNodeInfo").textContent =
        JSON.stringify({
          node_role: selfNode.node_role,
          node_addr: selfNode.node_addr,
          master_addr: selfNode.master_addr
        }, null, 2);

      const allNodes = data.distributed?.all_nodes?.nodes ?? [];

      document.getElementById("masterCount").textContent =
        allNodes.filter((node) => node.role === "master").length;
      document.getElementById("workerCount").textContent =
        data.distributed.worker_count ?? 0;
      document.getElementById("allNodeCount").textContent =
        data.distributed.all_nodes?.count ?? 0;
      document.getElementById("playerCount").textContent =
        data.player_count ?? 0;
      document.getElementById("configInfo").textContent =
        JSON.stringify(cfg, null, 2);
      document.getElementById("masterDeviceInfo").textContent =
        JSON.stringify({
          ...masterDevice,
          total_memory: formatMemory(masterDevice.total_memory_kb),
          started_at: formatTime(masterDevice.started_at)
        }, null, 2);

      const allRows = (data.distributed.all_nodes?.nodes ?? [])
        .map((node) => `
          <tr class="${node.node_id === selfNode.node_id ? "self-node" : ""}">
            <td>
              <div>
                ${node.node_id ?? ""}
                ${node.node_id === selfNode.node_id ? "<span class=\"badge\">本机</span>" : ""}
              </div>
              <div class="node-role ${node.role === "master" ? "master-role" : ""}">${node.role ?? ""}</div>
            </td>
            <td>${node.addr ?? ""}</td>
            <td>${node.current_load ?? 0}/${node.max_load ?? 0}</td>
            <td>${formatTime(node.last_heartbeat)}</td>
          </tr>
        `)
        .join("");

      document.getElementById("allNodeRows").innerHTML =
        allRows || "<tr><td colspan=\"5\">暂无节点</td></tr>";
    }

    async function connectDashboard() {
      const res = await fetch("/api/dashboard", { cache: "no-store" });
      const meta = await res.json();
      const socket = io(meta.dashboard_ns, {
        path: meta.socket_path || "/socket.io"
      });

      socket.on("dashboard", renderDashboard);
    }

    connectDashboard();
  </script>
</body>
</html>

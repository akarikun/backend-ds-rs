<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Addon JS Test</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #0f172a;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
    }
    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 8px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #111827;
      color: #e5e7eb;
    }
    button {
      cursor: pointer;
      background: #2563eb;
      border: none;
      font-weight: 700;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
      margin-top: 8px;
    }
    .actions button {
      margin-top: 0;
      background: #0ea5e9;
    }
    pre {
      padding: 12px;
      background: #111827;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h2>Addon JS Test</h2>

  <label>UserID</label>
  <input id="userid" value="test_userid">

  <label>CMD</label>
  <input id="cmd" value="create_player">

  <label>Data JSON</label>
  <textarea id="data" rows="6">{
  "userid": "test_userid",
  "nickname": "test_nickname"
}</textarea>

  <button onclick="connectWs()">连接 /ws</button>

  <h3>快捷测试</h3>
  <div class="actions">
    <button onclick="quickCreatePlayer()">创建玩家</button>
    <button onclick="quickGetPlayer()">查询玩家</button>
    <button onclick="quickAddGold()">加 100 金币</button>
    <button onclick="quickAddItem()">加 2 个道具</button>
    <button onclick="quickSendMail()">发送奖励邮件</button>
    <button onclick="quickClaimMail()">领取邮件</button>
  </div>

  <h3>状态</h3>
  <pre id="status">disconnected</pre>

  <h3>返回</h3>
  <pre id="result">{}</pre>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@msgpack/msgpack@3.1.2/dist.umd/msgpack.min.js"></script>
  <script>
    let socket = null;
    let lastMailId = "";
    let lastRequest = null;
    let pendingAfterCreate = null;
    const aesPassphrase = "V0.0.1-A265";

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function setResult(data) {
      document.getElementById("result").textContent = JSON.stringify(data, null, 2);
    }

    function rememberMailId(data) {
      const mailId = data
        && data.data
        && data.data.mail
        && (data.data.mail.id ?? data.data.mail._id ?? "");
      if (mailId !== null && mailId !== undefined && String(mailId).trim() !== "") {
        lastMailId = String(mailId).trim();
      }
    }

    function decodeMsgpackPayload(payload) {
      if (payload instanceof ArrayBuffer) {
        return MessagePack.decode(new Uint8Array(payload));
      }
      if (payload instanceof Uint8Array) {
        return MessagePack.decode(payload);
      }
      return payload;
    }

    function connectWs() {
      const userid = document.getElementById("userid").value.trim();
      const validuser = CryptoJS.AES.encrypt(userid, aesPassphrase).toString();

      if (socket) {
        socket.disconnect();
      }

      socket = io("/ws", {
        path: "/socket.io",
        auth: { userid, validuser }
      });

      socket.on("connect", () => setStatus(`connected: ${socket.id}`));
      socket.on("disconnect", (reason) => setStatus(`disconnected: ${reason}`));
      socket.on("connect_error", (err) => setStatus(`connect_error: ${err.message}`));
      socket.onAny((event, payload) => {
        const decoded = decodeMsgpackPayload(payload);
        const result = {
          event,
          request: lastRequest,
          data: decoded,
        };
        rememberMailId(result);
        if (event === "create_player_result" && pendingAfterCreate) {
          if (decoded && decoded.ok === true) {
            const next = pendingAfterCreate;
            pendingAfterCreate = null;
            quickSend(next.cmd, next.data);
          } else {
            pendingAfterCreate = null;
          }
        }

        const errorText = decoded && decoded.error ? `, error=${decoded.error}` : "";
        setStatus(
          `recv: ${event}, userid=${currentUserId()}${lastMailId ? `, lastMailId=${lastMailId}` : ""}${errorText}`
        );
        setResult(result);
      });
    }
    
    function emitCommand(cmd, data) {
      if (!socket || !socket.connected) {
        setStatus("请先连接 /ws");
        return;
      }
      lastRequest = { cmd, data };
      socket.emit("message", MessagePack.encode({ cmd, data }));
      setStatus(`sent: ${cmd}, userid=${currentUserId()}`);
    }

    function currentUserId() {
      return document.getElementById("userid").value.trim() || "test_userid";
    }

    function fillCommand(cmd, data) {
      document.getElementById("cmd").value = cmd;
      document.getElementById("data").value = JSON.stringify(data, null, 2);
    }

    function quickSend(cmd, data) {
      fillCommand(cmd, data);
      emitCommand(cmd, data);
    }

    function quickEnsurePlayerAndSend(cmd, data) {
      const userid = currentUserId();
      pendingAfterCreate = { cmd, data };
      emitCommand("create_player", {
        userid,
        nickname: "test_nickname"
      });
    }

    function quickCreatePlayer() {
      quickSend("create_player", {
        userid: currentUserId(),
        nickname: "test_nickname"
      });
    }

    function quickGetPlayer() {
      quickSend("get_player", {
        userid: currentUserId()
      });
    }

    function quickAddGold() {
      quickEnsurePlayerAndSend("add_currency", {
        userid: currentUserId(),
        currency: "gold",
        delta: 100
      });
    }

    function quickAddItem() {
      quickEnsurePlayerAndSend("add_item", {
        userid: currentUserId(),
        item_id: "sword_001",
        delta: 2
      });
    }

    function quickSendMail() {
      quickEnsurePlayerAndSend("send_mail", {
        userid: currentUserId(),
        title: "welcome",
        content: "starter reward",
        attachments: [
          { kind: "currency", name: "diamond", count: 10 },
          { kind: "item", item_id: "potion_001", count: 3 }
        ]
      });
    }

    function quickClaimMail() {
      const defaultMailId = lastMailId || "1";
      const mailId = String(prompt("请输入要领取的 mail_id", defaultMailId) || "").trim();
      if (!mailId) {
        setStatus("mail_id 无效");
        return;
      }

      quickEnsurePlayerAndSend("claim_mail", {
        userid: currentUserId(),
        mail_id: mailId
      });
    }
  </script>
</body>
</html>
